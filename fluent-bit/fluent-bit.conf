[SERVICE]
    Flush         5
    Log_Level     info
    Daemon        off
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# ─────────────────────────────────────────
# INPUT: принимаем логи от Docker (fluentd driver)
# ─────────────────────────────────────────
[INPUT]
    Name              forward
    Listen            0.0.0.0
    Port              24224
    Buffer_Chunk_Size 1M
    Buffer_Max_Size   6M

# ─────────────────────────────────────────
# FILTER: парсим JSON-лог Django (если используется python-json-logger)
# ─────────────────────────────────────────
[FILTER]
    Name         parser
    Match        django.*
    Key_Name     log
    Parser       django_json
    Reserve_Data On
    Preserve_Key Off

# ─────────────────────────────────────────
# FILTER: добавляем поле environment
# ─────────────────────────────────────────
[FILTER]
    Name    record_modifier
    Match   django.*
    Record  environment production
    Record  service     django

# ─────────────────────────────────────────
# OUTPUT: отправляем в Elasticsearch
# ─────────────────────────────────────────
[OUTPUT]
    Name            es
    Match           django.*
    Host            elasticsearch
    Port            9200
    Index           django-logs
    # Автоматически создаёт индекс с датой: django-logs-YYYY.MM.DD
    Logstash_Format On
    Logstash_Prefix django-logs
    Logstash_DateFormat %Y.%m.%d
    Time_Key        @timestamp
    Time_Key_Format %Y-%m-%dT%H:%M:%S.%L
    Include_Tag_Key On
    Tag_Key         fluentd_tag
    Retry_Limit     5
    # ES 8.x требует этот параметр
    Suppress_Type_Name On

# ─────────────────────────────────────────
# OUTPUT: дублируем в stdout для отладки (можно убрать в prod)
# ─────────────────────────────────────────
[OUTPUT]
    Name  stdout
    Match django.*
    Format json_lines
